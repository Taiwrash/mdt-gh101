name: Compile and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'proofs/**.json'
      - 'compile-proofs.js'
      - 'index.html'
      - 'style.css'
      - 'app.js'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  compile-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile Proofs
        run: node compile-proofs.js

      - name: Commit and Push Compiled Proofs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proofs.json
          if git diff --staged --quiet; then
            echo "No changes in proofs.json"
          else
            git commit -m "chore: auto-compile proofs.json [skip ci]"
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire directory contents
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
